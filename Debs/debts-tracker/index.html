<!doctype html>

<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    
    <title>Учёт Долгов | Obsidian Glass</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/glass.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/modals.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    
  </head>

  <body>
    <div class="animated-background">
      <canvas id="background-canvas"></canvas>
    </div>
    
    <div class="container">
      <header id="app-header"></header>

      <div class="main-wrapper">
        <div id="left-section"></div>
        <div id="middle-section"></div>
        <div id="stats-row" class="stats-grid"></div>
        <div id="right-section"></div>
      </div>
    </div>

    <!-- MODALS -->

    <div id="modal-root">
      <!-- ADD DEBT MODAL -->
      <div id="addModal" class="modal">
        <div class="modal-content glass">
          <button class="modal-close">✕</button>

          <h2>Новый долг</h2>

          <div class="input-group">
            <input
              id="debtorNameInput"
              list="debtorSuggestions"
              placeholder="Имя должника *"
              autocomplete="off"
              required
            />

            <datalist id="debtorSuggestions"></datalist>

            <input
              id="amountInput"
              type="text"
              placeholder="Сумма (₽) *"
              inputmode="numeric"
              required
            />

            <div class="category-buttons">

              <button type="button" class="category-btn active" data-type="transfer">
                <svg class="category-icon" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="5" width="20" height="14" rx="2"/>
                  <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>

                <span>Перевод</span>
              </button>

              <button type="button" class="category-btn" data-type="cash">
                <svg class="category-icon" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="6" width="20" height="12" rx="2"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>

                <span>Наличные</span>
              </button>

            </div>

            <input
              type="tel"
              id="debtorPhoneInput"
              placeholder="+7 999 999 99 99 (необязательно)"
              inputmode="tel"
              maxlength="18"
            />

            <textarea
              id="debtCommentInput"
              placeholder="Комментарий"
            ></textarea>
          </div>
          <div class="date-field">
            <label class="modal-label">
              Дата, когда дали в долг
            </label>

            <input type="date" id="debtDateInput" />
          </div>

          <div class="date-field">

            <label class="modal-label">
              Дата, когда обещали вернуть
              <span class="optional">(необязательно)</span>
            </label>

            <input type="date" id="returnDateInput" />

            <div class="modal-hint">
              Приложение напомнит о долге в указанную дату
            </div>

          </div>

          <div class="modal-actions">
            <button
              type="button"
              id="saveDebtBtn"
              class="btn-save"
              onclick="handleAddDebtClick()"
            >
              Сохранить долг
            </button>
          </div>
        </div>
      </div>

    <!-- WRITE OFF MODAL -->
    <div id="writeOffModal" class="modal">
      <div class="modal-content glass">
        <button class="modal-close" onclick="closeAllModals()">✕</button>

        <h2>Списать долг</h2>

        <div class="input-group">
          <input
            id="writeOffNameInput"
            list="debtorSuggestionsWrite"
            placeholder="Имя должника"
            autocomplete="off"
          />

          <datalist id="debtorSuggestionsWrite"></datalist>

          <input
            type="text"
            id="writeOffAmountInput"
            placeholder="Сумма списания (₽)"
            inputmode="numeric"
          />

          <!-- WRITE OFF ALL -->
          <div class="writeoff-box" id="writeOffBox">
            <label class="writeoff-toggle" for="writeOffModeAll">
              <span class="writeoff-text">
                Списать все долги должника
              </span>

              <input type="checkbox" id="writeOffModeAll" />
            </label>
          </div>

          <div id="debtsList" class="debts-list"></div>
        </div>

        <div class="modal-actions">
          <button
            id="confirmWriteOffBtn"
            class="btn-save"
            onclick="processWriteOff()"
            disabled
          >
            Списать долг
          </button>
        </div>
      </div>
    </div>
    
    <div id="debtCardModal" class="modal">
      <div class="modal-content glass debt-card">

        <button class="modal-close" onclick="closeDebtCard()">✕</button>

        <div id="debtCardContent"></div>

      </div>
    </div>

    <!-- STATS MODAL -->

    <div id="statsModal" class="modal">
      <div class="modal-content glass stats-modal">

        <button class="modal-close" onclick="closeStatsModal()">✕</button>

        <h2 id="statsModalTitle">Статистика</h2>

        <div id="statsModalList" class="stats-list"></div>

      </div>
    </div>
    
    <!-- LIBRARIES -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- CORE -->

    <script src="js/database.js" defer></script>

    <!-- UI -->

    <script src="js/icons.js" defer></script>
    <script src="js/ui.js" defer></script>

    <!-- APP LOGIC -->

    <script src="js/app.js" defer></script>

    <!-- VISUAL MODULES -->

    
    <script src="js/silk-background.js" defer></script>
  </body>
</html>
